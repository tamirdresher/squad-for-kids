name: Squad CI

on:
  push:
    branches: [main, dev]
    paths:
      - '**.js'
      - '**.ts'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - 'test/**'
      - 'scripts/**'
      - 'src/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, dev]
    paths:
      - '**.js'
      - '**.ts'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - 'test/**'
      - 'scripts/**'
      - 'src/**'
      - '.github/workflows/**'
  workflow_dispatch:
jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: node --test test/*.test.js
