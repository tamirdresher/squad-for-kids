name: "CodeQL Analysis"

# This repo is primarily markdown, PowerShell, and config files.
# The JS/TS code (dashboard-ui, scripts/) doesn't have a root build step,
# causing Autobuild failures on every push/PR. Scheduled monthly + manual.
on:
  schedule:
    - cron: '0 6 1 * *'  # First of every month at 6 AM UTC
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: self-hosted
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build
        shell: pwsh
        run: |
          # No root-level build process; let CodeQL analyze source directly
          Write-Output "Skipping build — source-only analysis"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
