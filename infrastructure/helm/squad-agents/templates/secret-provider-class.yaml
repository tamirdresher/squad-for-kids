{{- if .Values.global.keyVaultName }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: squad-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "squad-agents.labels" . | nindent 4 }}
spec:
  provider: azure
  secretObjects:
    # ── Runtime secrets (Phase 1 / fallback): GH_TOKEN + COPILOT_API_KEY ────
    - secretName: {{ .Values.keyVault.k8sSecretName }}
      type: Opaque
      data:
        - objectName: {{ .Values.keyVault.ghTokenSecretName }}
          key: GH_TOKEN
        - objectName: {{ .Values.keyVault.copilotApiKeySecretName }}
          key: COPILOT_API_KEY
        {{- if .Values.keyVault.mcpWebhookUrlSecretName }}
        - objectName: {{ .Values.keyVault.mcpWebhookUrlSecretName }}
          key: MCP_WEBHOOK_URL
        {{- end }}
    {{- if .Values.authProxy.enabled }}
    # ── GitHub App credentials (Phase 2+): used by the auth-proxy sidecar ───
    # Proxy fetches these from Key Vault at startup via Workload Identity.
    # Private key is loaded in-memory only — never written to disk or env var.
    - secretName: squad-github-app-credentials
      type: Opaque
      data:
        - objectName: {{ .Values.authProxy.keyVault.appIdSecretName }}
          key: GITHUB_APP_ID
        - objectName: {{ .Values.authProxy.keyVault.installationIdSecretName }}
          key: GITHUB_APP_INSTALLATION_ID
        - objectName: {{ .Values.authProxy.keyVault.privateKeySecretName }}
          key: GITHUB_APP_PRIVATE_KEY
    {{- end }}
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    {{- with .Values.serviceAccount.annotations }}
    clientID: {{ index . "azure.workload.identity/client-id" | default "" | quote }}
    {{- end }}
    keyvaultName: {{ .Values.global.keyVaultName | quote }}
    objects: |
      array:
        - |
          objectName: {{ .Values.keyVault.ghTokenSecretName }}
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.copilotApiKeySecretName }}
          objectType: secret
        {{- if .Values.keyVault.mcpWebhookUrlSecretName }}
        - |
          objectName: {{ .Values.keyVault.mcpWebhookUrlSecretName }}
          objectType: secret
        {{- end }}
        {{- if .Values.authProxy.enabled }}
        - |
          objectName: {{ .Values.authProxy.keyVault.appIdSecretName }}
          objectType: secret
        - |
          objectName: {{ .Values.authProxy.keyVault.installationIdSecretName }}
          objectType: secret
        - |
          objectName: {{ .Values.authProxy.keyVault.privateKeySecretName }}
          objectType: secret
        {{- end }}
    tenantId: {{ .Values.global.tenantId | quote }}
{{- end }}
