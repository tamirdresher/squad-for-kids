squad:
  repository: tamirdresher_microsoft/tamresearch1
  namespace: squad-system

ralph:
  replicas: 1
  image: ghcr.io/tamirdresher/squad-ralph:latest
  roundIntervalSeconds: 300
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

agent:
  image: ghcr.io/tamirdresher/squad-agent:latest
  defaultResources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

ratePool:
  enabled: true
  redis:
    image: redis:7-alpine
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

persistence:
  enabled: true
  storageClass: azurefile-csi
  size: 5Gi

github:
  tokenSecretName: squad-github-token
  workloadIdentity:
    enabled: false
    clientId: ""

copilot:
  primaryModel: copilot-sonnet
  fallbackChain:
    - copilot-gpt
    - kaito-local

scheduling:
  capabilityNodes:
    enabled: false
    gpuNodeSelector:
      capability.squad.io/gpu: "true"

keda:
  enabled: false
  prometheusAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
  
  tokenScaler:
    enabled: false
    minReplicaCount: 0
    maxReplicaCount: 5
    pollingInterval: 30
    cooldownPeriod: 300
    
    # Queue targeting
    targetQueuePerReplica: "2"
    
    # Token thresholds
    tokenThreshold: "5"
    tokenActivationThreshold: "1"
    
    # Rate limit thresholds
    rateLimitThreshold: "500"
    rateLimitActivationThreshold: "100"
    
    # Fallback
    fallbackGithubScaler: true

metricsExporter:
  enabled: false
  squadLabel: "squad:picard"
  pollIntervalSeconds: "30"
  port: 9100
  copilotMetricsPort: 9101
