<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סופרמן מציל את העולם 🦸‍♂️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    overflow: hidden;
  }
  canvas { display: block; border-radius: 12px; box-shadow: 0 0 40px rgba(0,100,255,0.4); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ─── Setup ───────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
canvas.width = W; canvas.height = H;

// ─── Game State ──────────────────────────────────────────────────
let state = 'menu'; // menu | playing | gameover
let score = 0;
let highScore = 0;
let frameCount = 0;
let difficulty = 1;
let shieldActive = false;
let shieldTimer = 0;
let shieldCooldown = 0;
let screenShake = 0;
let comboCount = 0;
let comboTimer = 0;
let lastRescueTime = 0;

const characters = [
  { name: 'סופרמן', emoji: '🦸‍♂️', color: '#2196F3', trail: '#ff4444' },
  { name: 'וונדר וומן', emoji: '🦸‍♀️', color: '#E91E63', trail: '#ffd700' },
  { name: 'באטמן', emoji: '🦇', color: '#424242', trail: '#7c4dff' }
];
let selectedChar = 0;
let hoverChar = -1;

// Player
const player = { x: W / 2, y: H - 120, w: 54, h: 54, speed: 7, vx: 0, vy: 0 };

// Entity pools
let meteors = [];
let citizens = [];
let particles = [];
let stars = [];
let floatingTexts = [];
let powerups = [];

// Keys
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Mouse for menu
let mouseX = 0, mouseY = 0, mouseDown = false;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top) * (H / r.height);
});
canvas.addEventListener('mousedown', () => mouseDown = true);
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('click', handleClick);

// ─── Init Stars ──────────────────────────────────────────────────
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 2.5 + 0.5,
    speed: Math.random() * 0.4 + 0.1,
    twinkle: Math.random() * Math.PI * 2
  });
}

// ─── Helpers ─────────────────────────────────────────────────────
function rand(min, max) { return Math.random() * (max - min) + min; }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function spawnParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: rand(-spread, spread),
      vy: rand(-spread, spread),
      life: rand(20, 50),
      maxLife: 50,
      color,
      size: rand(2, 6)
    });
  }
}

function spawnFloatingText(x, y, text, color, size) {
  floatingTexts.push({ x, y, text, color, size: size || 24, life: 60, vy: -2 });
}

function resetGame() {
  score = 0;
  frameCount = 0;
  difficulty = 1;
  shieldActive = false;
  shieldTimer = 0;
  shieldCooldown = 0;
  comboCount = 0;
  comboTimer = 0;
  player.x = W / 2;
  player.y = H - 120;
  player.vx = 0;
  player.vy = 0;
  meteors = [];
  citizens = [];
  particles = [];
  floatingTexts = [];
  powerups = [];
  screenShake = 0;
}

// ─── Click Handler ───────────────────────────────────────────────
function handleClick() {
  if (state === 'menu') {
    // Character selection boxes
    const boxW = 160, boxH = 180, gap = 40;
    const totalW = characters.length * boxW + (characters.length - 1) * gap;
    const startX = (W - totalW) / 2;
    const boxY = 320;
    for (let i = 0; i < characters.length; i++) {
      const bx = startX + i * (boxW + gap);
      if (mouseX >= bx && mouseX <= bx + boxW && mouseY >= boxY && mouseY <= boxY + boxH) {
        selectedChar = i;
      }
    }
    // Start button
    const btnW = 320, btnH = 64;
    const btnX = (W - btnW) / 2, btnY = 560;
    if (mouseX >= btnX && mouseX <= btnX + btnW && mouseY >= btnY && mouseY <= btnY + btnH) {
      state = 'playing';
      resetGame();
    }
  } else if (state === 'gameover') {
    const btnW = 280, btnH = 60;
    const btnX = (W - btnW) / 2, btnY = 460;
    if (mouseX >= btnX && mouseX <= btnX + btnW && mouseY >= btnY && mouseY <= btnY + btnH) {
      state = 'menu';
    }
  }
}

// ─── Drawing Helpers ─────────────────────────────────────────────
function drawGradientSky() {
  const timeShift = Math.sin(frameCount * 0.002) * 20;
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, `rgb(${10 + timeShift}, ${10 + timeShift}, ${60 + timeShift})`);
  grd.addColorStop(0.4, `rgb(${30 + timeShift}, ${20 + timeShift}, ${100 + timeShift})`);
  grd.addColorStop(0.7, '#1a1a4e');
  grd.addColorStop(1, '#0d0d2b');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  stars.forEach(s => {
    s.twinkle += 0.03;
    const alpha = 0.4 + Math.sin(s.twinkle) * 0.4;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
    if (state === 'playing') {
      s.y += s.speed;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    }
  });
}

function drawCityscape() {
  const buildings = [
    { x: 0, w: 80, h: 160 }, { x: 90, w: 60, h: 220 }, { x: 160, w: 100, h: 180 },
    { x: 270, w: 70, h: 260 }, { x: 350, w: 90, h: 200 }, { x: 450, w: 110, h: 240 },
    { x: 570, w: 80, h: 170 }, { x: 660, w: 100, h: 290 }, { x: 770, w: 70, h: 210 },
    { x: 850, w: 90, h: 250 }, { x: 950, w: 80, h: 190 }, { x: 1040, w: 100, h: 270 },
    { x: 1150, w: 70, h: 200 }, { x: 1220, w: 80, h: 230 }
  ];
  buildings.forEach(b => {
    const grd = ctx.createLinearGradient(b.x, H - b.h, b.x, H);
    grd.addColorStop(0, '#1a1a3e');
    grd.addColorStop(1, '#0d0d2b');
    ctx.fillStyle = grd;
    ctx.fillRect(b.x, H - b.h, b.w, b.h);
    // Windows
    ctx.fillStyle = 'rgba(255,220,100,0.6)';
    for (let wy = H - b.h + 15; wy < H - 15; wy += 25) {
      for (let wx = b.x + 10; wx < b.x + b.w - 10; wx += 18) {
        if (Math.random() > 0.3) {
          ctx.fillRect(wx, wy, 8, 12);
        }
      }
    }
  });
}

function drawPlayer() {
  const ch = characters[selectedChar];
  const px = player.x, py = player.y;

  // Shield glow
  if (shieldActive) {
    const pulseR = 40 + Math.sin(frameCount * 0.15) * 8;
    const grd = ctx.createRadialGradient(px, py, 10, px, py, pulseR);
    grd.addColorStop(0, 'rgba(0,200,255,0.4)');
    grd.addColorStop(0.6, 'rgba(0,150,255,0.2)');
    grd.addColorStop(1, 'rgba(0,100,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(px, py, pulseR, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = `rgba(0,200,255,${0.5 + Math.sin(frameCount * 0.2) * 0.3})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(px, py, 34, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Trail
  if (state === 'playing') {
    for (let i = 0; i < 3; i++) {
      const tx = px - player.vx * (i + 1) * 3 + rand(-3, 3);
      const ty = py - player.vy * (i + 1) * 3 + rand(-3, 3);
      const alpha = 0.3 - i * 0.1;
      ctx.fillStyle = ch.trail + Math.floor(alpha * 255).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(tx, ty, 8 - i * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Character
  ctx.font = '48px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Shadow
  ctx.shadowColor = ch.color;
  ctx.shadowBlur = 20;
  ctx.fillText(ch.emoji, px, py);
  ctx.shadowBlur = 0;
}

function drawHUD() {
  // Score panel (top-left)
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(20, 15, 240, 55, 12);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  roundRect(20, 15, 240, 55, 12);
  ctx.stroke();

  ctx.font = 'bold 28px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd700';
  ctx.fillText(`⭐ ניקוד: ${score}`, 245, 43);

  // Shield cooldown bar
  const barX = W - 250, barY = 20, barW = 230, barH = 14;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(barX - 5, barY - 5, barW + 10, barH + 30, 8);
  ctx.fill();

  ctx.font = '14px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa';
  ctx.fillText('מגן (רווח)', barX + barW, barY + barH + 20);

  // Bar background
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(barX, barY, barW, barH, 7);
  ctx.fill();

  if (shieldActive) {
    const pct = shieldTimer / 180;
    const grd = ctx.createLinearGradient(barX, 0, barX + barW * pct, 0);
    grd.addColorStop(0, '#00e5ff');
    grd.addColorStop(1, '#2979ff');
    ctx.fillStyle = grd;
    roundRect(barX, barY, barW * pct, barH, 7);
    ctx.fill();
  } else if (shieldCooldown > 0) {
    const pct = 1 - (shieldCooldown / 300);
    ctx.fillStyle = '#666';
    roundRect(barX, barY, barW * pct, barH, 7);
    ctx.fill();
  } else {
    const grd = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    grd.addColorStop(0, '#69f0ae');
    grd.addColorStop(1, '#00e676');
    ctx.fillStyle = grd;
    roundRect(barX, barY, barW, barH, 7);
    ctx.fill();
  }

  // Combo display
  if (comboCount >= 2 && comboTimer > 0) {
    const scale = 1 + Math.sin(frameCount * 0.15) * 0.1;
    ctx.save();
    ctx.translate(W / 2, 80);
    ctx.scale(scale, scale);
    ctx.font = 'bold 36px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff6d00';
    ctx.shadowColor = '#ff6d00';
    ctx.shadowBlur = 15;
    ctx.fillText(`🔥 קומבו x${comboCount}!`, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Difficulty indicator
  ctx.font = '16px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#888';
  const lvl = Math.floor(difficulty);
  ctx.fillText(`שלב ${lvl}`, 20, H - 15);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─── Menu Screen ─────────────────────────────────────────────────
function drawMenu() {
  drawGradientSky();
  drawStars();
  drawCityscape();

  // Title glow
  const titleY = 120;
  ctx.save();
  ctx.font = 'bold 64px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Glow layers
  ctx.shadowColor = '#ffab00';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#fff';
  ctx.fillText('סופרמן מציל את העולם 🦸‍♂️', W / 2, titleY);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.font = '24px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#90caf9';
  ctx.fillText('🌟 בחרו גיבור והצילו את האזרחים! 🌟', W / 2, titleY + 60);
  ctx.restore();

  // Subtitle animated line
  ctx.font = '18px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = `rgba(255,255,255,${0.4 + Math.sin(frameCount * 0.05) * 0.3})`;
  ctx.textAlign = 'center';
  ctx.fillText('⬆️⬇️⬅️➡️ תנועה  |  רווח = מגן מיוחד  |  הצילו אזרחים 👤  |  הימנעו ממטאורים 🌑', W / 2, 250);

  // Character selection
  const boxW = 160, boxH = 180, gap = 40;
  const totalW = characters.length * boxW + (characters.length - 1) * gap;
  const startX = (W - totalW) / 2;
  const boxY = 320;

  ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#e0e0e0';
  ctx.fillText('בחרו דמות:', W / 2, boxY - 30);

  for (let i = 0; i < characters.length; i++) {
    const ch = characters[i];
    const bx = startX + i * (boxW + gap);
    const isHover = mouseX >= bx && mouseX <= bx + boxW && mouseY >= boxY && mouseY <= boxY + boxH;
    const isSelected = i === selectedChar;

    // Box
    ctx.fillStyle = isSelected ? 'rgba(33,150,243,0.3)' : (isHover ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.4)');
    roundRect(bx, boxY, boxW, boxH, 16);
    ctx.fill();

    ctx.strokeStyle = isSelected ? ch.color : (isHover ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)');
    ctx.lineWidth = isSelected ? 3 : 1;
    roundRect(bx, boxY, boxW, boxH, 16);
    ctx.stroke();

    if (isSelected) {
      ctx.shadowColor = ch.color;
      ctx.shadowBlur = 20;
      roundRect(bx, boxY, boxW, boxH, 16);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Emoji
    ctx.font = '56px serif';
    ctx.textAlign = 'center';
    ctx.fillText(ch.emoji, bx + boxW / 2, boxY + 70);

    // Name
    ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = isSelected ? '#fff' : '#bbb';
    ctx.fillText(ch.name, bx + boxW / 2, boxY + 140);

    // Checkmark
    if (isSelected) {
      ctx.font = '24px serif';
      ctx.fillText('✅', bx + boxW / 2, boxY + 165);
    }
  }

  // Start button
  const btnW = 320, btnH = 64;
  const btnX = (W - btnW) / 2, btnY = 560;
  const btnHover = mouseX >= btnX && mouseX <= btnX + btnW && mouseY >= btnY && mouseY <= btnY + btnH;

  const pulse = Math.sin(frameCount * 0.06) * 0.1;
  ctx.save();
  ctx.translate(btnX + btnW / 2, btnY + btnH / 2);
  ctx.scale(1 + (btnHover ? 0.05 : 0) + pulse, 1 + (btnHover ? 0.05 : 0) + pulse);
  ctx.translate(-(btnX + btnW / 2), -(btnY + btnH / 2));

  const btnGrd = ctx.createLinearGradient(btnX, btnY, btnX + btnW, btnY + btnH);
  btnGrd.addColorStop(0, '#ff6d00');
  btnGrd.addColorStop(0.5, '#ff9100');
  btnGrd.addColorStop(1, '#ffab00');
  ctx.fillStyle = btnGrd;
  roundRect(btnX, btnY, btnW, btnH, 32);
  ctx.fill();

  ctx.shadowColor = '#ff6d00';
  ctx.shadowBlur = btnHover ? 30 : 15;
  roundRect(btnX, btnY, btnW, btnH, 32);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.font = 'bold 28px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText('🚀 התחל משימת הצלה!', btnX + btnW / 2, btnY + btnH / 2);
  ctx.restore();

  // High score
  if (highScore > 0) {
    ctx.font = '20px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#ffd740';
    ctx.textAlign = 'center';
    ctx.fillText(`🏆 שיא: ${highScore}`, W / 2, btnY + btnH + 40);
  }

  // Footer
  ctx.font = '14px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('נבנה עם Squad for Kids 💜', W / 2, H - 20);
}

// ─── Game Over Screen ────────────────────────────────────────────
function drawGameOver() {
  drawGradientSky();
  drawStars();
  drawCityscape();

  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  const pw = 500, ph = 400;
  const px = (W - pw) / 2, py = (H - ph) / 2;
  ctx.fillStyle = 'rgba(15,15,50,0.95)';
  roundRect(px, py, pw, ph, 24);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  roundRect(px, py, pw, ph, 24);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Title
  ctx.font = 'bold 48px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#ff5252';
  ctx.shadowColor = '#ff5252';
  ctx.shadowBlur = 20;
  ctx.fillText('המשימה הסתיימה! 💥', W / 2, py + 70);
  ctx.shadowBlur = 0;

  // Score
  ctx.font = 'bold 72px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#ffd740';
  ctx.shadowColor = '#ffd740';
  ctx.shadowBlur = 15;
  ctx.fillText(`${score}`, W / 2, py + 170);
  ctx.shadowBlur = 0;

  ctx.font = '24px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.fillText('אזרחים ניצלו', W / 2, py + 220);

  // High score
  if (score >= highScore && score > 0) {
    ctx.font = 'bold 28px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#69f0ae';
    ctx.fillText('🎉 שיא חדש!', W / 2, py + 270);
  } else {
    ctx.font = '22px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText(`🏆 שיא: ${highScore}`, W / 2, py + 270);
  }

  // Character used
  ctx.font = '40px serif';
  ctx.fillText(characters[selectedChar].emoji, W / 2, py + 320);

  // Restart button
  const btnW = 280, btnH = 60;
  const btnX = (W - btnW) / 2, btnY2 = py + ph - 80;
  const btnHover = mouseX >= btnX && mouseX <= btnX + btnW && mouseY >= btnY2 && mouseY <= btnY2 + btnH;

  const btnGrd = ctx.createLinearGradient(btnX, btnY2, btnX + btnW, btnY2 + btnH);
  btnGrd.addColorStop(0, '#42a5f5');
  btnGrd.addColorStop(1, '#1e88e5');
  ctx.fillStyle = btnGrd;
  roundRect(btnX, btnY2, btnW, btnH, 30);
  ctx.fill();

  if (btnHover) {
    ctx.shadowColor = '#42a5f5';
    ctx.shadowBlur = 20;
    roundRect(btnX, btnY2, btnW, btnH, 30);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.font = 'bold 24px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText('🔄 חזרה לתפריט', (W) / 2, btnY2 + btnH / 2);

  // Floating particles on game over
  if (particles.length < 30 && frameCount % 5 === 0) {
    particles.push({
      x: rand(px, px + pw), y: py + ph,
      vx: rand(-1, 1), vy: rand(-3, -1),
      life: rand(30, 80), maxLife: 80,
      color: ['#ff5252', '#ffd740', '#69f0ae', '#42a5f5'][Math.floor(Math.random() * 4)],
      size: rand(2, 5)
    });
  }
}

// ─── Game Logic ──────────────────────────────────────────────────
function updateGame() {
  frameCount++;
  difficulty = 1 + frameCount / 1800; // slowly ramp up

  // Player movement with momentum
  const spd = shieldActive ? player.speed * 1.5 : player.speed;
  if (keys['ArrowLeft'] || keys['KeyA']) player.vx = lerp(player.vx, -spd, 0.25);
  else if (keys['ArrowRight'] || keys['KeyD']) player.vx = lerp(player.vx, spd, 0.25);
  else player.vx *= 0.85;

  if (keys['ArrowUp'] || keys['KeyW']) player.vy = lerp(player.vy, -spd, 0.25);
  else if (keys['ArrowDown'] || keys['KeyS']) player.vy = lerp(player.vy, spd, 0.25);
  else player.vy *= 0.85;

  player.x = clamp(player.x + player.vx, 30, W - 30);
  player.y = clamp(player.y + player.vy, 30, H - 30);

  // Shield
  if (keys['Space'] && !shieldActive && shieldCooldown <= 0) {
    shieldActive = true;
    shieldTimer = 180; // 3 seconds at 60fps
    spawnParticles(player.x, player.y, '#00e5ff', 20, 5);
  }
  if (shieldActive) {
    shieldTimer--;
    if (shieldTimer <= 0) {
      shieldActive = false;
      shieldCooldown = 300; // 5 second cooldown
    }
  }
  if (shieldCooldown > 0) shieldCooldown--;

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Spawn meteors
  const meteorRate = Math.max(15, 45 - difficulty * 5);
  if (frameCount % Math.floor(meteorRate) === 0) {
    const size = rand(20, 35) * (1 + difficulty * 0.1);
    meteors.push({
      x: rand(30, W - 30),
      y: -40,
      size,
      speed: rand(2, 4) * (1 + difficulty * 0.15),
      rotation: 0,
      rotSpeed: rand(-0.05, 0.05)
    });
  }

  // Spawn citizens
  const citizenRate = Math.max(30, 70 - difficulty * 4);
  if (frameCount % Math.floor(citizenRate) === 0) {
    citizens.push({
      x: rand(40, W - 40),
      y: -30,
      speed: rand(1.5, 3) * (1 + difficulty * 0.05),
      wobble: rand(0, Math.PI * 2),
      saved: false
    });
  }

  // Spawn powerups occasionally
  if (frameCount % 600 === 0 && powerups.length < 2) {
    powerups.push({
      x: rand(60, W - 60), y: -30,
      type: Math.random() > 0.5 ? 'shield' : 'points',
      speed: 1.5,
      wobble: 0
    });
  }

  // Update meteors
  meteors.forEach(m => {
    m.y += m.speed;
    m.rotation += m.rotSpeed;
  });
  meteors = meteors.filter(m => m.y < H + 50);

  // Update citizens
  citizens.forEach(c => {
    c.y += c.speed;
    c.wobble += 0.05;
    c.x += Math.sin(c.wobble) * 0.5;
  });
  citizens = citizens.filter(c => c.y < H + 50 && !c.saved);

  // Update powerups
  powerups.forEach(p => {
    p.y += p.speed;
    p.wobble += 0.04;
  });
  powerups = powerups.filter(p => p.y < H + 50);

  // Collision: player vs meteors
  for (let m of meteors) {
    if (dist(player, m) < m.size + 20) {
      if (shieldActive) {
        // Deflect meteor
        spawnParticles(m.x, m.y, '#00e5ff', 15, 6);
        spawnFloatingText(m.x, m.y, '🛡️', '#00e5ff', 30);
        m.y = H + 100; // remove it
        screenShake = 5;
      } else {
        // Game over
        spawnParticles(player.x, player.y, '#ff5252', 40, 8);
        screenShake = 15;
        if (score > highScore) highScore = score;
        state = 'gameover';
        return;
      }
    }
  }

  // Collision: player vs citizens (rescue!)
  for (let c of citizens) {
    if (!c.saved && dist(player, c) < 40) {
      c.saved = true;
      const now = frameCount;
      if (now - lastRescueTime < 90) {
        comboCount++;
        comboTimer = 90;
      } else {
        comboCount = 1;
        comboTimer = 90;
      }
      lastRescueTime = now;

      const points = comboCount >= 3 ? 3 : comboCount >= 2 ? 2 : 1;
      score += points;
      spawnParticles(c.x, c.y, '#ffd740', 12, 4);
      spawnFloatingText(c.x, c.y - 20, `+${points} ⭐`, '#ffd740', points > 1 ? 32 : 24);
      if (comboCount >= 3) {
        spawnFloatingText(c.x, c.y - 50, '🔥 מדהים!', '#ff6d00', 28);
      }
    }
  }

  // Collision: player vs powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    if (dist(player, p) < 35) {
      if (p.type === 'shield' && !shieldActive) {
        shieldActive = true;
        shieldTimer = 180;
        shieldCooldown = 0;
        spawnParticles(p.x, p.y, '#00e5ff', 20, 5);
        spawnFloatingText(p.x, p.y, '🛡️ מגן!', '#00e5ff', 28);
      } else if (p.type === 'points') {
        score += 5;
        spawnParticles(p.x, p.y, '#ffd740', 20, 5);
        spawnFloatingText(p.x, p.y, '+5 ⭐', '#ffd740', 32);
      }
      powerups.splice(i, 1);
    }
  }

  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.85;

  // Update particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.vy += 0.05; // gravity
  });
  particles = particles.filter(p => p.life > 0);

  // Update floating texts
  floatingTexts.forEach(ft => {
    ft.y += ft.vy;
    ft.life--;
  });
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);
}

function drawGame() {
  ctx.save();
  if (screenShake > 1) {
    ctx.translate(rand(-screenShake, screenShake), rand(-screenShake, screenShake));
  }

  drawGradientSky();
  drawStars();
  drawCityscape();

  // Draw powerups
  powerups.forEach(p => {
    const bob = Math.sin(p.wobble) * 5;
    ctx.font = '32px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = p.type === 'shield' ? '#00e5ff' : '#ffd740';
    ctx.shadowBlur = 15;
    ctx.fillText(p.type === 'shield' ? '🛡️' : '💎', p.x, p.y + bob);
    ctx.shadowBlur = 0;
  });

  // Draw meteors
  meteors.forEach(m => {
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.rotation);
    // Glow
    ctx.shadowColor = '#ff3d00';
    ctx.shadowBlur = m.size * 0.8;
    ctx.font = `${Math.floor(m.size * 1.3)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🌑', 0, 0);
    ctx.shadowBlur = 0;
    // Fire trail
    for (let i = 1; i <= 3; i++) {
      ctx.globalAlpha = 0.3 / i;
      ctx.fillText('🔥', rand(-5, 5), -m.size * 0.5 * i);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  });

  // Draw citizens
  citizens.forEach(c => {
    if (c.saved) return;
    const bob = Math.sin(c.wobble) * 3;
    ctx.font = '36px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Help text
    ctx.font = '14px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = `rgba(255,255,255,${0.4 + Math.sin(c.wobble * 2) * 0.3})`;
    ctx.fillText('הצילו!', c.x, c.y - 28);
    // Person
    ctx.font = '36px serif';
    ctx.fillText('👤', c.x, c.y + bob);
  });

  // Draw particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw floating texts
  floatingTexts.forEach(ft => {
    const alpha = ft.life / 60;
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${ft.size}px "Segoe UI", Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = ft.color;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 10;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;

  drawPlayer();
  drawHUD();

  ctx.restore();
}

// ─── Main Loop ───────────────────────────────────────────────────
function gameLoop() {
  ctx.clearRect(0, 0, W, H);

  if (state === 'menu') {
    frameCount++;
    drawMenu();
  } else if (state === 'playing') {
    updateGame();
    drawGame();
  } else if (state === 'gameover') {
    frameCount++;
    drawGame(); // frozen background
    drawGameOver();
  }

  // Draw + update particles even on non-playing screens
  if (state !== 'playing') {
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    particles = particles.filter(p => p.life > 0);
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
