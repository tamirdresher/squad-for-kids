name: Squad Issue Assign — ילדים

on:
  issues:
    types: [labeled]
  workflow_dispatch:

jobs:
  assign-work:
    if: startsWith(github.event.label.name, 'squad:')
    runs-
on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Assign to squad member
        uses: actions/github-script@v7
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const label = context.payload.label.name;
            const memberName = label.replace('squad:', '').toLowerCase();

            // Check if this is a copilot assignment
            const isCopilot = memberName === 'copilot';

            let comment;
            if (isCopilot) {
              comment = [
                `### 🤖 מועבר ל-@copilot`,
                '',
                `**Issue:** #${issue.number} — ${issue.title}`,
                '',
                `@copilot יתחיל לעבוד על זה אוטומטית.`,
                '',
                `> הסוכן ייצור branch חדש ויפתח Pull Request.`,
                `> תבדקו את הקוד כמו שבודקים עבודה של חבר צוות! 👀`,
              ].join('\n');
            } else {
              comment = [
                `### 📋 שויך ל-${memberName}`,
                '',
                `**Issue:** #${issue.number} — ${issue.title}`,
                '',
                `${memberName} יעבוד על זה בסשן Copilot הבא.`,
                '',
                `> פתחו Copilot Chat ותגידו:`,
                `> \`${memberName}, תעבוד על issue #${issue.number}\``,
              ].join('\n');
            }

            // Avoid duplicate comments
            const { data: existingComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });

            const marker = isCopilot ? '🤖 מועבר ל-@copilot' : `📋 שויך ל-${memberName}`;
            const existing = existingComments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: comment
              });
            }

            core.info(`Issue #${issue.number} assigned to ${memberName}`);

      # Auto-assign @copilot if token is available
      - name: Assign @copilot coding agent
        if: github.event.label.name == 'squad:copilot'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_ASSIGN_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;

            try {
              const { data: repoData } = await github.rest.repos.get({ owner, repo });
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner, repo, issue_number,
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: `${owner}/${repo}`,
                  base_branch: repoData.default_branch
                }
              });
              core.info(`Assigned @copilot to issue #${issue_number}`);
            } catch (err) {
              core.warning(`Could not assign @copilot: ${err.message}`);
              try {
                await github.rest.issues.addAssignees({
                  owner, repo, issue_number,
                  assignees: ['copilot-swe-agent']
                });
              } catch (err2) {
                core.warning(`Fallback also failed: ${err2.message}`);
              }
            }
