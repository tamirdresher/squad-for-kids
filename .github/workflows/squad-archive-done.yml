name: Squad Archive Done Items

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  archive-done-items:
    runs-on: self-hosted
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive old Done items
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.SQUAD_PROJECT_TOKEN }}
          DAYS_THRESHOLD: '3'
          PROJECT_OWNER: 'tamirdresher_microsoft'
          PROJECT_NUMBER: '1'
          PROJECT_ID: 'PVT_kwHOC0L5c84BRG-P'
          STATUS_FIELD_ID: 'PVTSSF_lAHOC0L5c84BRG-Pzg_CIuc'
        run: |
          $daysThreshold = [int]$env:DAYS_THRESHOLD
          $cutoffDate = (Get-Date).AddDays(-$daysThreshold)
          Write-Host "🔍 Looking for Done items older than $daysThreshold days (before $($cutoffDate.ToString('o')))"

          # Fetch all project items via GraphQL (works with EMU accounts unlike gh project item-list)
          $query = @'
          query($projectId: ID!, $after: String) {
            node(id: $projectId) {
              ... on ProjectV2 {
                items(first: 100, after: $after) {
                  nodes {
                    id
                    fieldValueByName(name: "Status") {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name
                      }
                    }
                    content {
                      ... on Issue {
                        number
                        title
                        updatedAt
                        state
                      }
                    }
                  }
                  pageInfo {
                    hasNextPage
                    endCursor
                  }
                }
              }
            }
          }
          '@

          $allItems = @()
          $after = $null

          do {
            $params = @('-f', "projectId=$($env:PROJECT_ID)", '-f', "query=$query")
            if ($after) {
              $params += @('-f', "after=$after")
            }
            $resultJson = gh api graphql @params 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "❌ Failed to list project items: $resultJson"
              exit 1
            }

            $result = $resultJson | ConvertFrom-Json
            $items = $result.data.node.items
            $allItems += $items.nodes
            $hasNextPage = $items.pageInfo.hasNextPage
            $after = $items.pageInfo.endCursor
          } while ($hasNextPage)

          Write-Host "📋 Found $($allItems.Count) total items on the project board"

          $checkedCount = 0
          $archivedCount = 0

          foreach ($item in $allItems) {
            $status = $item.fieldValueByName.name
            if ($status -eq 'Done') {
              $checkedCount++
              $content = $item.content
              if (-not $content -or -not $content.number) { continue }

              $updatedAt = [DateTime]::Parse($content.updatedAt)

              if ($updatedAt -lt $cutoffDate) {
                Write-Host "📦 Archiving: #$($content.number) - $($content.title) (updated: $($updatedAt.ToString('o')))"

                # Close the issue if still open
                if ($content.state -eq 'OPEN') {
                  gh issue close $content.number --comment "✅ Archived by Squad — this item was in Done status for $daysThreshold+ days." 2>$null
                }

                # Archive from the project board using GraphQL
                $mutation = "mutation { archiveProjectV2Item(input: {projectId: \`"$($env:PROJECT_ID)\`", itemId: \`"$($item.id)\`"}) { item { id } } }"
                gh api graphql -f query="$mutation" 2>$null
                if ($LASTEXITCODE -eq 0) {
                  $archivedCount++
                } else {
                  Write-Host "⚠️ Could not archive #$($content.number) from board (may need project token)"
                }
              } else {
                Write-Host "⏳ Skipping: #$($content.number) - $($content.title) (updated: $($updatedAt.ToString('o'))) - not old enough"
              }
            }
          }

          Write-Host ""
          Write-Host "✅ Summary:"
          Write-Host "   - Checked $checkedCount Done items"
          Write-Host "   - Archived $archivedCount items older than $daysThreshold days"

          # Explicit exit 0 to prevent $LASTEXITCODE bleed-through from gh CLI calls
          $global:LASTEXITCODE = 0
          exit 0
