name: Squad CI

on:
  workflow_dispatch:
    # All auto-triggers disabled - hosted runners unavailable at org level
    # Re-enable when runners are configured for this repo
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: node --test test/*.test.js
