name: Squad Docs — Build & Validate

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/squad-docs.yml'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install build dependencies
        shell: pwsh
        run: npm install --no-save markdown-it markdown-it-anchor

      - name: Build docs site
        shell: pwsh
        run: |
          if (-not (Test-Path "docs/build.js")) {
            Write-Output "docs/build.js not found, skipping build"
            exit 0
          }
          node docs/build.js --out _site --base /squad
          if (Test-Path "_site") {
            Write-Output "Build successful — _site directory created"
            Get-ChildItem _site -Recurse | Measure-Object | ForEach-Object { Write-Output "$($_.Count) files generated" }
          } else {
            Write-Error "Build completed but no _site directory created"
            exit 1
          }
