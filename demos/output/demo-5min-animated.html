<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>Squad for Kids — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #010409;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  #terminal-window {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    background: #0d1117;
    position: relative;
  }

  /* Title bar */
  #title-bar {
    height: 38px;
    min-height: 38px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    user-select: none;
  }
  .dot {
    width: 12px; height: 12px; border-radius: 50%;
  }
  .dot-red   { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green  { background: #28c840; }
  #title-bar .title {
    flex: 1;
    text-align: center;
    color: #8b949e;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }
  .dot-spacer { width: 52px; }

  /* Terminal body */
  #terminal-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 20px 60px 20px;
    scroll-behavior: smooth;
    position: relative;
  }
  #terminal-body::-webkit-scrollbar { width: 8px; }
  #terminal-body::-webkit-scrollbar-track { background: #0d1117; }
  #terminal-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

  /* Scanline overlay */
  #scanlines {
    position: absolute;
    top: 38px; left: 0; right: 0; bottom: 28px;
    pointer-events: none;
    z-index: 10;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
  }

  /* Content area */
  #content {
    color: #e6edf3;
    font-size: 14.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 17px;
    background: #58a6ff;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    margin-left: 1px;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Colors */
  .prompt-path  { color: #58a6ff; }
  .prompt-arrow { color: #3fb950; font-weight: 700; }
  .user-text    { color: #f0f6fc; }
  .agent-text   { color: #e6edf3; }
  .cyan         { color: #58a6ff; }
  .gold         { color: #ffd700; }
  .brown        { color: #cd853f; }
  .silver       { color: #c0c0c0; }
  .red          { color: #ff6b6b; }
  .orange       { color: #ffa500; }
  .purple       { color: #b19cd9; }
  .green        { color: #3fb950; }
  .dim          { color: #8b949e; }
  .bold         { font-weight: 700; }
  .title-card   { color: #58a6ff; font-weight: 700; }

  /* Progress bar */
  #progress-bar-container {
    height: 28px;
    min-height: 28px;
    background: #161b22;
    border-top: 1px solid #30363d;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 20;
    position: relative;
  }
  #progress-track {
    flex: 1;
    height: 4px;
    background: #21262d;
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #58a6ff, #3fb950);
    border-radius: 2px;
    transition: width 0.5s linear;
  }
  #progress-time {
    color: #8b949e;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    min-width: 80px;
    text-align: right;
  }
  #progress-label {
    color: #8b949e;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    min-width: 60px;
  }
</style>
</head>
<body>

<div id="terminal-window">
  <div id="title-bar">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
    <div class="title">Squad for Kids — Demo</div>
    <div class="dot-spacer"></div>
  </div>
  <div id="terminal-body">
    <div id="content"></div>
  </div>
  <div id="scanlines"></div>
  <div id="progress-bar-container">
    <div id="progress-label">DEMO</div>
    <div id="progress-track"><div id="progress-fill"></div></div>
    <div id="progress-time">0:00 / 1:53</div>
  </div>
</div>

<script>
(function() {
  const TOTAL_DURATION = 113; // seconds
  const CHAR_DELAY = 40;
  const LINE_DELAY = 100;
  const SLOW_LINE_DELAY = 200;
  const ENTER_PAUSE = 800;
  const SCENE_PAUSE = 1500;

  const contentEl = document.getElementById('content');
  const bodyEl = document.getElementById('terminal-body');
  const progressFill = document.getElementById('progress-fill');
  const progressTime = document.getElementById('progress-time');

  let startTime = 0;
  let cursorEl = null;

  function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  function updateProgress() {
    if (!startTime) return;
    const elapsed = (Date.now() - startTime) / 1000;
    const pct = Math.min(100, (elapsed / TOTAL_DURATION) * 100);
    progressFill.style.width = pct + '%';
    progressTime.textContent = fmtTime(elapsed) + ' / 1:53';
    if (elapsed < TOTAL_DURATION + 10) requestAnimationFrame(updateProgress);
  }

  function scrollToBottom() {
    bodyEl.scrollTop = bodyEl.scrollHeight;
  }

  function removeCursor() {
    if (cursorEl && cursorEl.parentNode) cursorEl.parentNode.removeChild(cursorEl);
    cursorEl = null;
  }

  function addCursor() {
    removeCursor();
    cursorEl = document.createElement('span');
    cursorEl.className = 'cursor';
    contentEl.appendChild(cursorEl);
    scrollToBottom();
  }

  function appendRaw(html) {
    removeCursor();
    const span = document.createElement('span');
    span.innerHTML = html;
    contentEl.appendChild(span);
    scrollToBottom();
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  // Type text character by character
  async function typeText(text, className, delay) {
    delay = delay || CHAR_DELAY;
    removeCursor();
    const span = document.createElement('span');
    if (className) span.className = className;
    contentEl.appendChild(span);
    addCursor();
    for (let i = 0; i < text.length; i++) {
      span.textContent += text[i];
      scrollToBottom();
      await sleep(delay);
    }
    removeCursor();
  }

  // Show prompt
  async function showPrompt() {
    appendRaw('\n<span class="prompt-path">C:\\squad-for-kids</span><span class="prompt-arrow">&gt; </span>');
    addCursor();
    await sleep(400);
  }

  // User types a command
  async function userTypes(text) {
    await typeText(text, 'user-text', CHAR_DELAY);
    appendRaw('\n');
    await sleep(ENTER_PAUSE);
  }

  // Agent outputs lines with optional per-line delay
  async function agentLines(lines, delayPerLine) {
    delayPerLine = delayPerLine || LINE_DELAY;
    for (let i = 0; i < lines.length; i++) {
      appendRaw(lines[i] + '\n');
      scrollToBottom();
      await sleep(delayPerLine);
    }
  }

  // Colorize character names in text
  function c(color, text) {
    return '<span class="' + color + '">' + text + '</span>';
  }
  function bold(text) {
    return '<span class="bold">' + text + '</span>';
  }

  // Title card display
  async function showTitleCard(lines, holdMs) {
    for (let i = 0; i < lines.length; i++) {
      appendRaw('<span class="title-card">' + lines[i] + '</span>\n');
      await sleep(120);
    }
    await sleep(holdMs || 3000);
  }

  // Clear terminal
  function clearTerminal() {
    contentEl.innerHTML = '';
  }

  // ── MAIN SCRIPT ──
  async function runDemo() {
    startTime = Date.now();
    requestAnimationFrame(updateProgress);

    // ═══ [0:00] Title Card ═══
    await sleep(500);
    await showTitleCard([
      '╔════════════════════════════════════════════════╗',
      '║     🎓 Squad for Kids — Live Demo             ║',
      '║     Adaptive AI Education Platform             ║',
      '║     Built with GitHub Copilot + Squad          ║',
      '╚════════════════════════════════════════════════╝',
    ], 2500);

    clearTerminal();
    await sleep(300);

    // ═══ [0:03] Terminal prompt ═══
    await showPrompt();
    await sleep(600);

    // ═══ [0:04] User types: copilot ═══
    await userTypes('copilot');
    await agentLines([
      '<span class="dim">GitHub Copilot CLI v1.0.10</span>',
      '<span class="dim">Loading squad agent...</span> <span class="green">✅</span>',
    ], 400);
    await sleep(SCENE_PAUSE);

    // ═══ [0:06] User types: hi ═══
    await showPrompt();
    await userTypes('hi');

    // ═══ [0:07] Agent responds ═══
    await agentLines([
      '🎉 ' + bold('Welcome to Squad for Kids!') + ' 🎉',
      '',
      'I\'m going to build you your very own team of awesome learning helpers!',
      'But first, I need to get to know you a little bit. Ready? Let\'s go! 🚀',
      '',
      bold('What\'s your first name?'),
    ]);
    await sleep(SCENE_PAUSE);

    // ═══ [0:12] User types: Yoav ═══
    await showPrompt();
    await userTypes('Yoav');

    // ═══ [0:13] Agent responds ═══
    await agentLines([
      'Nice to meet you, ' + bold('Yoav') + '! 😊',
      '',
      'When\'s your birthday? 🎂',
    ]);
    await sleep(SCENE_PAUSE);

    // ═══ [0:16] User types: March 12, 2018 ═══
    await showPrompt();
    await userTypes('March 12, 2018');

    // ═══ [0:17] Agent responds ═══
    await agentLines([
      'You\'re ' + bold('7 years old') + ' — almost 8! 🎈',
      '',
      'What grade are you in?',
    ]);
    await sleep(SCENE_PAUSE);

    // ═══ [0:20] User types: 2nd grade ═══
    await showPrompt();
    await userTypes('2nd grade');

    // ═══ [0:21] Agent responds ═══
    await agentLines([
      bold('Grade 2') + ' — awesome! 📚',
      '',
      'What city do you live in? 🏙️',
    ]);
    await sleep(SCENE_PAUSE);

    // ═══ [0:24] User types: Rishon LeZion ═══
    await showPrompt();
    await userTypes('Rishon LeZion');

    // ═══ [0:25] Agent responds ═══
    await agentLines([
      '🇮🇱 Detected: ' + bold('Israel — Rishon LeZion'),
      '📚 Curriculum: Israeli Ministry of Education (תכנית הלימודים)',
      '📖 Subjects: Math, Hebrew, Reading, Science, English, Bible Studies, Art, PE, Social Skills',
      '',
      '🗣️ Since you\'re in Israel, I\'ll talk to you in Hebrew (עברית).',
      'Would you like that, or would you prefer a different language?',
    ], 200);
    await sleep(SCENE_PAUSE);

    // ═══ [0:33] User types: English please ═══
    await showPrompt();
    await userTypes('English please');

    // ═══ [0:34] Agent responds ═══
    await agentLines([
      'English it is! 🇬🇧',
      '',
      '🎬 One more fun question, ' + bold('Yoav') + '!',
      'What\'s your ' + bold('FAVORITE') + ' movie, show, book, or game?',
      '(This is going to be really cool, I promise! 😎)',
    ]);
    await sleep(SCENE_PAUSE);

    // ═══ [0:39] User types: Harry Potter ═══
    await showPrompt();
    await userTypes('Harry Potter');

    // ═══ [0:40] THE BIG REVEAL — slow lines ═══
    await sleep(600);
    await agentLines([
      '',
      '🎉✨ ' + bold('Yoav, YOUR SQUAD IS READY!') + ' ✨🎉',
      '',
      'Meet your amazing learning team:',
      '',
    ], 250);

    // Hermione
    await agentLines([
      c('gold', '🎓 Hermione Granger') + ' — Your ' + bold('Head Teacher'),
      c('gold', '   "I\'ll make sure you learn everything you need for grade 2!'),
      c('gold', '    Organization and preparation are key — let\'s make a plan!"'),
      '',
    ], SLOW_LINE_DELAY);

    // Hagrid
    await agentLines([
      c('brown', '📚 Hagrid') + ' — Your ' + bold('Science & Subject Helper'),
      c('brown', '   "Don\' worry, we\'ll figure it out together! I know a thing or two'),
      c('brown', '    about creatures, nature, and how the world works!"'),
      '',
    ], SLOW_LINE_DELAY);

    // Luna
    await agentLines([
      c('silver', '🎨 Luna Lovegood') + ' — Your ' + bold('Creative Coach'),
      c('silver', '   "The things others find strange are usually the most interesting.'),
      c('silver', '    Let\'s create something nobody\'s ever seen before!"'),
      '',
    ], SLOW_LINE_DELAY);

    // Fred
    await agentLines([
      c('red', '🎮 Fred Weasley') + ' — Your ' + bold('Gamer'),
      c('red', '   "Right then — fancy a challenge? I\'ve got games that\'ll make'),
      c('red', '    your brain do backflips! Wanna play?"'),
      '',
    ], SLOW_LINE_DELAY);

    // George
    await agentLines([
      c('orange', '🎬 George Weasley') + ' — Your ' + bold('YouTuber'),
      c('orange', '   "Welcome to today\'s episode! I\'m going to explain this so well,'),
      c('orange', '    even Percy would be impressed. Ready? Action!"'),
      '',
    ], SLOW_LINE_DELAY);

    // Dobby
    await agentLines([
      c('purple', '🤗 Dobby') + ' — Your ' + bold('Study Buddy'),
      c('purple', '   "Dobby is here to help! Dobby believes in you, and Dobby will'),
      c('purple', '    always be here when you need a friend. 💙"'),
      '',
    ], SLOW_LINE_DELAY);

    await agentLines([
      bold('Ready to start learning?') + ' Just tell me what you\'d like to work on! 🚀',
    ], 200);
    await sleep(SCENE_PAUSE);

    // ═══ [1:05] User types: Let's do some math! ═══
    await showPrompt();
    await userTypes("Let's do some math!");

    // ═══ [1:06] Agent responds ═══
    await agentLines([
      c('gold', '🎓 Hermione:') + ' Excellent choice, Yoav! A proper wizard always knows their numbers!',
      '',
      'Let\'s start with a quick warm-up! 🧙‍♀️',
      '',
      '📐 ' + bold('Challenge 1:') + ' If you have 7 chocolate frogs and Hagrid gives you 8 more,',
      '   how many chocolate frogs do you have now?',
      '',
      'Take your time — even I double-check my arithmetic! 📝',
    ]);
    await sleep(SCENE_PAUSE);

    // ═══ [1:14] User types: 15 ═══
    await showPrompt();
    await userTypes('15');

    // ═══ [1:15] Agent responds ═══
    await agentLines([
      c('gold', '🎓 Hermione:') + ' 🌟 ' + bold('BRILLIANT') + ', Yoav! 7 + 8 = 15 — absolutely correct!',
      '   +10 XP! You\'re on your way to becoming a math wizard! 🧙‍♀️',
      '',
      '📐 ' + bold('Challenge 2:') + ' Yoav has 23 Bertie Bott\'s Every Flavour Beans.',
      '   He eats 9 of them (hopefully not the earwax ones! 🤢).',
      '   How many does he have left?',
    ]);
    await sleep(SCENE_PAUSE);

    // ═══ [1:22] User types: 14 ═══
    await showPrompt();
    await userTypes('14');

    // ═══ [1:23] Agent responds ═══
    await agentLines([
      c('gold', '🎓 Hermione:') + ' 🌟 Perfect! 23 - 9 = 14! Two for two!',
      '   +10 XP! Total: ' + bold('20 XP') + ' 🏆',
    ]);
    await sleep(SCENE_PAUSE);

    // ═══ [1:28] User types: Show me the parent report ═══
    await showPrompt();
    await userTypes('Show me the parent report');

    // ═══ [1:29] Agent responds with table ═══
    await agentLines([
      '',
      '📊 ' + bold('Weekly Learning Report — Yoav'),
      '',
      '📈 Week at a Glance',
      c('cyan', '┌─────────────────────┬──────────────────────┐'),
      c('cyan', '│') + ' Sessions this week   ' + c('cyan', '│') + ' 1                    ' + c('cyan', '│'),
      c('cyan', '│') + ' Total learning time  ' + c('cyan', '│') + ' ~5 minutes           ' + c('cyan', '│'),
      c('cyan', '│') + ' Subjects covered     ' + c('cyan', '│') + ' Mathematics          ' + c('cyan', '│'),
      c('cyan', '│') + ' XP earned           ' + c('cyan', '│') + ' +20 XP               ' + c('cyan', '│'),
      c('cyan', '│') + ' Current level       ' + c('cyan', '│') + ' Level 1: Rookie      ' + c('cyan', '│'),
      c('cyan', '│') + ' Streak              ' + c('cyan', '│') + ' 1 day 🔥             ' + c('cyan', '│'),
      c('cyan', '└─────────────────────┴──────────────────────┘'),
      '',
      '💪 ' + bold('Strengths:') + ' Quick mental arithmetic, addition confidence',
      '🎯 ' + bold('Practice needed:') + ' Will discover as more sessions happen',
      '💡 ' + bold('Recommendation:') + ' Yoav responded well to Harry Potter themed',
      '   problems — keep using character references for engagement!',
    ], 120);
    await sleep(SCENE_PAUSE);

    // ═══ [1:40] User types: Thanks, bye! ═══
    await showPrompt();
    await userTypes('Thanks, bye!');

    // ═══ [1:41] Agent responds ═══
    await agentLines([
      c('purple', '🤗 Dobby:') + ' Dobby was so happy to learn with Yoav today!',
      c('purple', '   Dobby will be right here whenever you want to come back! 💙'),
      '',
      c('gold', '🎓 Hermione:') + ' Great first session, Yoav! See you next time — we have',
      c('gold', '   SO much more to explore! ✨'),
      '',
      '📊 Session saved. ' + bold('+20 XP earned today!'),
    ]);
    await sleep(2000);

    // ═══ [1:48] End Card ═══
    clearTerminal();
    await sleep(500);
    await showTitleCard([
      '╔════════════════════════════════════════════════════════════╗',
      '║  🎓 Squad for Kids                                        ║',
      '║  github.com/tamirdresher/squad-for-kids                   ║',
      '║                                                            ║',
      '║  ✅ Auto-detects curriculum from location                  ║',
      '║  ✅ Casts learning team from kid\'s favorite universe       ║',
      '║  ✅ Grade transitions handled automatically                ║',
      '║  ✅ Parent reports via upstream squad                       ║',
      '║  ✅ 10+ languages, RTL support                             ║',
      '║                                                            ║',
      '║  Built with GitHub Copilot + Squad Framework               ║',
      '╚════════════════════════════════════════════════════════════╝',
    ], 5000);

    // Done — freeze progress at 100%
    progressFill.style.width = '100%';
    progressTime.textContent = '1:53 / 1:53';
  }

  // Start 2 seconds after page load
  window.addEventListener('load', function() {
    setTimeout(runDemo, 2000);
  });
})();
</script>
</body>
</html>
