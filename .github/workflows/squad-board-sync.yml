name: Squad Board Sync

# Automatically manage project board:
# - Set "Todo" on new squad issues
# - Move to "Done" when issues close
# - Add PRs to board with "Review" status when review is requested
# - Reconcile board state weekly

on:
  issues:
    types: [opened, closed, reopened, labeled]
  pull_request:
    types: [opened, review_requested, ready_for_review]
  pull_request_review:
    types: [submitted]
  schedule:
    # Weekly reconciliation every Sunday at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger for immediate reconciliation

env:
  PROJECT_ID: 'PVT_kwHOC0L5c84BRG-P'
  PROJECT_NUMBER: '1'
  PROJECT_OWNER: 'tamirdresher_microsoft'
  STATUS_FIELD_ID: 'PVTSSF_lAHOC0L5c84BRG-Pzg_CIuc'
  DONE_OPTION_ID: '4830e3e3'
  TODO_OPTION_ID: '0de780a1'
  REVIEW_OPTION_ID: '1807f788'

jobs:
  # ── Job: Track PRs on the board ──
  track-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
    runs-on: self-hosted
    timeout-minutes: 5
    permissions:
      issues: read
      pull-requests: read
      contents: read

    steps:
      - name: Add PR to board and set status
        shell: pwsh
        run: |
          $prNumber = ${{ github.event.pull_request.number || github.event.review.pull_request_number || 0 }}
          $eventName = '${{ github.event_name }}'
          $action = '${{ github.event.action }}'

          if ($prNumber -eq 0) {
            Write-Host "No PR number found — skipping"
            exit 0
          }

          Write-Host "🔄 PR #$prNumber — event: $eventName/$action"

          # Add PR to project board and get item ID directly
          $prUrl = "https://github.com/${{ github.repository }}/pull/$prNumber"
          $addJson = gh project item-add $env:PROJECT_NUMBER --owner $env:PROJECT_OWNER --url $prUrl --format json 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "⚠️ Could not add PR to project: $addJson"
            exit 0
          }

          $addData = $addJson | ConvertFrom-Json
          $itemId = $addData.id
          if (-not $itemId) {
            Write-Host "⚠️ Could not get item ID from add response"
            exit 0
          }
          Write-Host "✅ PR added to board (item: $itemId)"

          # Determine target status based on event
          $targetStatus = $null
          $targetOptionId = $null

          if ($eventName -eq 'pull_request') {
            if ($action -in @('opened', 'review_requested', 'ready_for_review')) {
              $targetStatus = 'Review'
              $targetOptionId = $env:REVIEW_OPTION_ID
            }
          }
          elseif ($eventName -eq 'pull_request_review') {
            $reviewState = '${{ github.event.review.state }}'
            if ($reviewState -eq 'approved') {
              # Leave as Review or move to Done when merged (handled by reconciliation)
              Write-Host "✅ PR #$prNumber approved — status stays until merged"
              exit 0
            }
            elseif ($reviewState -eq 'changes_requested') {
              $targetStatus = 'In Progress'
              $targetOptionId = '238ff87a'  # In Progress option ID
            }
          }

          if (-not $targetStatus) {
            Write-Host "ℹ️ No status change needed for this event"
            exit 0
          }

          $currentStatus = $addData.status
          if ($currentStatus -eq $targetStatus) {
            Write-Host "ℹ️ PR #$prNumber already in '$currentStatus'"
            exit 0
          }

          Write-Host "📋 Moving PR #$prNumber from '$currentStatus' → $targetStatus"
          gh project item-edit --project-id $env:PROJECT_ID --id $itemId --field-id $env:STATUS_FIELD_ID --single-select-option-id $targetOptionId 2>&1
          Write-Host "✅ Done"

  # ── Job 0: Set Todo status on new issues added to board ──
  set-todo-on-new:
    if: github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'labeled')
    runs-on: self-hosted
    timeout-minutes: 5
    permissions:
      issues: read
      contents: read

    env:
      PROJECT_ID: 'PVT_kwHOC0L5c84BRG-P'
      PROJECT_NUMBER: '1'
      PROJECT_OWNER: 'tamirdresher_microsoft'
      STATUS_FIELD_ID: 'PVTSSF_lAHOC0L5c84BRG-Pzg_CIuc'
      TODO_OPTION_ID: '0de780a1'

    steps:
      - name: Add to board and set Todo status
        shell: pwsh
        run: |
          $issueNumber = ${{ github.event.issue.number }}
          $action = '${{ github.event.action }}'
          $labels = '${{ join(github.event.issue.labels.*.name, ',') }}'
          Write-Host "📋 Issue #$issueNumber was $action (labels: $labels)"

          # For 'labeled' events, only act if the squad label was just added
          if ($action -eq 'labeled') {
            $addedLabel = '${{ github.event.label.name }}'
            if ($addedLabel -ne 'squad' -and -not $addedLabel.StartsWith('squad:')) {
              Write-Host "ℹ️ Label '$addedLabel' is not squad-related — skipping"
              exit 0
            }
          }

          # For 'opened' events, only act if the issue has a squad label
          if ($action -eq 'opened') {
            if ($labels -notmatch 'squad') {
              Write-Host "ℹ️ Issue #$issueNumber has no squad label — skipping"
              exit 0
            }
          }

          # Add issue to project board and get item ID directly (avoids expensive item-list)
          $issueUrl = '${{ github.event.issue.html_url }}'
          Write-Host "➕ Adding issue #$issueNumber to board..."
          $addJson = gh project item-add $env:PROJECT_NUMBER --owner $env:PROJECT_OWNER --url $issueUrl --format json 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "⚠️ Could not add to project: $addJson"
            exit 0
          }

          $addData = $addJson | ConvertFrom-Json
          $itemId = $addData.id
          if (-not $itemId) {
            Write-Host "⚠️ Could not get item ID from add response"
            exit 0
          }
          Write-Host "✅ Added to board (item: $itemId)"

          # Set status to Todo
          Write-Host "📋 Setting #$issueNumber status → Todo"
          gh project item-edit --project-id $env:PROJECT_ID --id $itemId --field-id $env:STATUS_FIELD_ID --single-select-option-id $env:TODO_OPTION_ID 2>&1
          Write-Host "✅ Issue #$issueNumber is now Todo"

  # ── Job 1: Move item on issue close/reopen ──
  sync-on-close:
    if: github.event_name == 'issues'
    runs-on: self-hosted
    timeout-minutes: 5
    permissions:
      issues: read
      contents: read

    env:
      PROJECT_ID: 'PVT_kwHOC0L5c84BRG-P'
      PROJECT_NUMBER: '1'
      PROJECT_OWNER: 'tamirdresher_microsoft'
      STATUS_FIELD_ID: 'PVTSSF_lAHOC0L5c84BRG-Pzg_CIuc'
      DONE_OPTION_ID: '4830e3e3'
      TODO_OPTION_ID: '0de780a1'

    steps:
      - name: Sync board status on issue state change
        shell: pwsh
        run: |
          $issueNumber = ${{ github.event.issue.number }}
          $action = '${{ github.event.action }}'
          Write-Host "🔄 Issue #$issueNumber was $action"

          if ($action -ne 'closed' -and $action -ne 'reopened') {
            Write-Host "ℹ️ Action '$action' doesn't need board sync"
            exit 0
          }

          # Use item-add (idempotent) to get the item ID without listing all items
          $issueUrl = '${{ github.event.issue.html_url }}'
          $addJson = gh project item-add $env:PROJECT_NUMBER --owner $env:PROJECT_OWNER --url $issueUrl --format json 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "⚠️ Could not add/find item on board: $addJson"
            exit 0
          }

          $addData = $addJson | ConvertFrom-Json
          $itemId = $addData.id
          if (-not $itemId) {
            Write-Host "⚠️ Could not get item ID"
            exit 0
          }

          if ($action -eq 'closed') {
            Write-Host "📋 Moving #$issueNumber → Done"
            gh project item-edit --project-id $env:PROJECT_ID --id $itemId --field-id $env:STATUS_FIELD_ID --single-select-option-id $env:DONE_OPTION_ID 2>&1
            Write-Host "✅ Done"
          }
          elseif ($action -eq 'reopened') {
            Write-Host "📋 Issue #$issueNumber was reopened → Todo"
            gh project item-edit --project-id $env:PROJECT_ID --id $itemId --field-id $env:STATUS_FIELD_ID --single-select-option-id $env:TODO_OPTION_ID 2>&1
            Write-Host "✅ Moved to Todo"
          }

  # ── Job 2: Weekly reconciliation of all board items ──
  reconcile-board:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      issues: read
      contents: read

    env:
      PROJECT_ID: 'PVT_kwHOC0L5c84BRG-P'
      PROJECT_NUMBER: '1'
      PROJECT_OWNER: 'tamirdresher_microsoft'
      STATUS_FIELD_ID: 'PVTSSF_lAHOC0L5c84BRG-Pzg_CIuc'
      DONE_OPTION_ID: '4830e3e3'
      TODO_OPTION_ID: '0de780a1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconcile board state
        shell: pwsh
        run: |
          Write-Host "🔍 Starting weekly board reconciliation"

          $itemsJson = gh project item-list $env:PROJECT_NUMBER --owner $env:PROJECT_OWNER --limit 200 --format json 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Failed to list project items: $itemsJson"
            exit 1
          }

          $data = $itemsJson | ConvertFrom-Json
          $items = $data.items
          Write-Host "📋 Found $($items.Count) items on board"

          $fixedCount = 0
          $checkedCount = 0
          $issues = @()

          foreach ($item in $items) {
            $num = $item.content.number
            if (-not $num) { continue }
            $checkedCount++

            $boardStatus = $item.status
            $issueJson = gh issue view $num --json state,title 2>$null
            if ($LASTEXITCODE -ne 0) { continue }
            $issue = $issueJson | ConvertFrom-Json
            $issueState = $issue.state

            # Rule 1: CLOSED issue must be in Done
            if ($issueState -eq 'CLOSED' -and $boardStatus -ne 'Done') {
              Write-Host "🔧 #$num: CLOSED but in '$boardStatus' → moving to Done"
              gh project item-edit --project-id $env:PROJECT_ID --id $item.id --field-id $env:STATUS_FIELD_ID --single-select-option-id $env:DONE_OPTION_ID 2>&1
              $fixedCount++
              $issues += "#$num (was '$boardStatus')"
            }

            # Rule 2: OPEN issue in Done should move to Todo
            if ($issueState -eq 'OPEN' -and $boardStatus -eq 'Done') {
              Write-Host "🔧 #$num: OPEN but in 'Done' → moving to Todo"
              gh project item-edit --project-id $env:PROJECT_ID --id $item.id --field-id $env:STATUS_FIELD_ID --single-select-option-id $env:TODO_OPTION_ID 2>&1
              $fixedCount++
              $issues += "#$num (OPEN in Done)"
            }

            # Rule 3: OPEN issue with no status should be set to Todo
            if ($issueState -eq 'OPEN' -and -not $boardStatus) {
              Write-Host "🔧 #$num: OPEN but no status → setting to Todo"
              gh project item-edit --project-id $env:PROJECT_ID --id $item.id --field-id $env:STATUS_FIELD_ID --single-select-option-id $env:TODO_OPTION_ID 2>&1
              $fixedCount++
              $issues += "#$num (no status → Todo)"
            }
          }

          Write-Host ""
          Write-Host "✅ Reconciliation complete:"
          Write-Host "   Checked: $checkedCount items"
          Write-Host "   Fixed: $fixedCount mismatches"

          if ($fixedCount -gt 0) {
            $body = "## 🔄 Board Reconciliation Report`n`nFixed $fixedCount mismatched items:`n"
            foreach ($i in $issues) { $body += "- $i`n" }
            $body += "`nRun by: squad-board-sync workflow (weekly reconciliation)"
            # Create a comment on a tracking issue or log
            Write-Host $body
          }
