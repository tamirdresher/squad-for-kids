# =============================================================================
# picard-scaledobject.yaml — KEDA ScaledObject for Picard (composite triggers)
#
# Replaces the simple single-trigger ScaledObject that was embedded in
# picard-deployment.yaml. This version adds:
#
#   1. Prometheus trigger: squad_copilot_queue_depth
#      → how many open issues are waiting for Picard to process
#
#   2. Prometheus trigger: github_api_rate_limit_remaining{resource="core"}
#      → GitHub API rate-limit headroom (from squad-metrics-exporter)
#
#   3. scalingModifiers formula (KEDA v2.12+ AND logic):
#      → scale up ONLY when work exists AND rate limit headroom is sufficient
#      → scale to ZERO when no issues or rate limit is exhausted
#
#   4. Cron pre-warm trigger:
#      → keeps at least 1 replica warm during business hours (Asia/Jerusalem)
#      → avoids cold-start latency for the first issue of the day
#
#   5. GitHub Actions runner queue trigger (github-runner, issue #1158):
#      → counts pending Actions workflow jobs for the Squad repo
#      → 1 replica per targetWorkflowQueueLength queued jobs
#      → uses ETag caching to minimise GitHub API rate-limit spend
#      → conditionally rendered when keda.githubRunnerTrigger.enabled=true
#
# Architecture:
#   squad-metrics-exporter ─→ Prometheus metrics ─→ KEDA ScaledObject
#                                                          │
#                                                          ▼
#                                                  Picard Deployment
#                                              (scales 0 → maxReplicaCount)
#
# Prerequisites:
#   - KEDA v2.12+ installed (AKS add-on: az aks update --enable-keda)
#   - squad-metrics-exporter Deployment running (github-metrics-exporter.yaml)
#   - keda.enabled=true AND metricsExporter.enabled=true in values.yaml
#   - (Trigger 5 only) keda.githubRunnerTrigger.enabled=true AND
#     github-pat-secret created manually:
#       kubectl create secret generic github-pat-secret \
#         --namespace squad --from-literal=token=<GITHUB_PAT>
#     PAT scopes required: repo (Actions read access)
#
# Related: #1134 (this issue), #1141 (scaler type research), #1136 (AKS setup)
#          #1158 (github-runner trigger, Tier 1)
# =============================================================================
{{- if .Values.keda.enabled }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: picard-scaler
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "squad-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: picard
  annotations:
    squad.github.com/issue: "1134"
    squad.github.com/description: "Composite KEDA scaler: scale Picard on queue depth AND rate-limit headroom"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: picard

  minReplicaCount: {{ .Values.keda.picard.minReplicaCount }}
  maxReplicaCount: {{ .Values.keda.picard.maxReplicaCount }}
  pollingInterval: {{ .Values.keda.picard.pollingInterval }}
  cooldownPeriod:  {{ .Values.keda.picard.cooldownPeriod }}

  # ---------------------------------------------------------------------------
  # scalingModifiers — AND logic (KEDA v2.12+)
  #
  # Formula semantics (expr language):
  #   s0 = squad_copilot_queue_depth       (open issues count)
  #   s1 = github_api_rate_limit_remaining (GitHub API headroom)
  #
  # Logic:
  #   • If queue > 0 AND rate_limit_remaining > threshold → return queue depth
  #     → KEDA calculates: desired = ceil(queueDepth / target)
  #   • Otherwise → return 0 → KEDA scales to minReplicaCount (0)
  #
  # Example:
  #   3 open issues, 4500 rate limit remaining, target=2
  #   → formula returns 3 → desired = ceil(3/2) = 2 replicas
  #
  #   0 open issues → formula returns 0 → 0 replicas (scale to zero)
  #   3 open issues, 50 rate limit remaining → formula returns 0 → scale to zero
  #     (protects against burning the last rate limit tokens)
  # ---------------------------------------------------------------------------
  {{- if .Values.keda.picard.composite.enabled }}
  advanced:
    scalingModifiers:
      formula: >-
        s0 > 0 && s1 > {{ .Values.keda.picard.composite.rateLimitThreshold }} ? s0 : 0
      target: {{ .Values.keda.picard.composite.targetQueuePerReplica | quote }}
  {{- end }}

  triggers:
    # -------------------------------------------------------------------------
    # Trigger 0 (s0): Queue depth — how many open issues need processing
    # Metric: squad_copilot_queue_depth{label="squad:picard"}
    # -------------------------------------------------------------------------
    {{- if .Values.keda.picard.composite.enabled }}
    - type: prometheus
      name: s0
      metadata:
        serverAddress: >-
          http://squad-metrics-exporter.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.metricsExporter.port }}
        query: >-
          squad_copilot_queue_depth{label={{ .Values.metricsExporter.squadLabel | quote }}}
        threshold: {{ .Values.keda.picard.composite.targetQueuePerReplica | quote }}
        activationThreshold: "1"

    # -------------------------------------------------------------------------
    # Trigger 1 (s1): Rate limit remaining — GitHub API headroom guard
    # Metric: github_api_rate_limit_remaining{resource="core"}
    # Scaling formula uses this to prevent scaling when rate-limited.
    # -------------------------------------------------------------------------
    - type: prometheus
      name: s1
      metadata:
        serverAddress: >-
          http://squad-metrics-exporter.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.metricsExporter.port }}
        query: >-
          github_api_rate_limit_remaining{resource="core"}
        threshold: {{ .Values.keda.picard.composite.rateLimitThreshold | quote }}
        # Don't activate the scaler at all if rate limit is critically low
        activationThreshold: {{ .Values.keda.picard.composite.rateLimitActivationThreshold | quote }}

    {{- else }}
    # -------------------------------------------------------------------------
    # Fallback: simple GitHub issue count scaler (no composite logic)
    # Used when keda.picard.composite.enabled=false
    # -------------------------------------------------------------------------
    - type: github
      metadata:
        owner: {{ .Values.global.repository | splitList "/" | first | quote }}
        repo: {{ .Values.global.repository | splitList "/" | last | quote }}
        labels: "squad:picard"
        state: "open"
        targetIssueCount: {{ .Values.keda.picard.targetIssueCount | quote }}
      authenticationRef:
        name: github-trigger-auth
    {{- end }}

    # -------------------------------------------------------------------------
    # Trigger 2 (cron): Pre-warm during business hours
    # Keeps at least 1 replica alive so the first issue of the day
    # doesn't suffer cold-start latency (pod scheduling + image pull).
    # Schedule matches Asia/Jerusalem working hours (Sun–Thu 08:00–20:00).
    # -------------------------------------------------------------------------
    {{- if .Values.keda.picard.prewarm.enabled }}
    - type: cron
      metadata:
        timezone: {{ .Values.keda.picard.prewarm.timezone | quote }}
        start: {{ .Values.keda.picard.prewarm.start | quote }}
        end:   {{ .Values.keda.picard.prewarm.end | quote }}
        desiredReplicas: {{ .Values.keda.picard.prewarm.desiredReplicas | quote }}
    {{- end }}

    # -------------------------------------------------------------------------
    # Trigger 3 (github-runner): GitHub Actions job queue depth (issue #1158)
    #
    # Scale UP: 1 replica per targetWorkflowQueueLength pending Actions jobs.
    # Scale DOWN: pods removed when the Actions job queue drains to zero.
    # enableEtags: "true" — ETag caching reduces GitHub API rate-limit spend.
    # This trigger is additive: KEDA takes the max across all active triggers.
    # Conditionally rendered — requires keda.githubRunnerTrigger.enabled=true
    # AND the github-pat-secret to exist in the squad namespace.
    # See: keda-github-auth.yaml for the TriggerAuthentication resource.
    # Ref: https://keda.sh/docs/2.19/scalers/github-runner/
    # -------------------------------------------------------------------------
    {{- if .Values.keda.githubRunnerTrigger.enabled }}
    - type: github-runner
      authenticationRef:
        name: github-runner-auth
      metadata:
        owner: {{ .Values.keda.githubRunnerTrigger.owner | quote }}
        runnerScope: {{ .Values.keda.githubRunnerTrigger.runnerScope | quote }}
        repos: {{ .Values.keda.githubRunnerTrigger.repos | quote }}
        targetWorkflowQueueLength: {{ .Values.keda.githubRunnerTrigger.targetWorkflowQueueLength | quote }}
        enableEtags: "true"
    {{- end }}

---
# TriggerAuthentication: reuse the existing squad-runtime-secrets for the
# fallback github scaler (when composite is disabled).
# When composite=true, the Prometheus scaler reads from in-cluster exporter
# and does NOT need a TriggerAuthentication.
{{- if not .Values.keda.picard.composite.enabled }}
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: github-trigger-auth
  namespace: {{ .Values.global.namespace }}
spec:
  secretTargetRef:
    - parameter: personalAccessToken
      name: {{ .Values.keyVault.k8sSecretName }}
      key: GH_TOKEN
{{- end }}
{{- end }}
