name: Squad Heartbeat — ראלף בודק דופק 💓

on:
  schedule:
    # כל 6 שעות — בודק שהכל בסדר
    - cr
on: '0 */6 * * *'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-
on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Ralph health check
        uses: actions/github-script@v7
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            // Check for untriaged issues (no squad label)
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50
            });

            const untriaged = openIssues.filter(issue => {
              // Skip PRs
              if (issue.pull_request) return false;
              // Check if has any squad-related label
              const hasSquadLabel = issue.labels.some(l =>
                l.name === 'squad' || l.name.startsWith('squad:') || l.name.startsWith('type:')
              );
              return !hasSquadLabel;
            });

            if (untriaged.length === 0) {
              core.info('📋 הכל מסווג — אין issues ללא לייבל');
              return;
            }

            core.info(`🔍 נמצאו ${untriaged.length} issues ללא סיווג`);

            // Auto-label untriaged issues with 'squad' to trigger triage
            for (const issue of untriaged.slice(0, 5)) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['squad']
                });
                core.info(`🏷️ הוספתי לייבל squad ל-#${issue.number}: ${issue.title}`);
              } catch (err) {
                core.warning(`❌ נכשל בהוספת לייבל ל-#${issue.number}: ${err.message}`);
              }
            }

      - name: Check stale PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 20
            });

            const now = new Date();
            const stale = prs.filter(pr => {
              const updated = new Date(pr.updated_at);
              const daysSinceUpdate = (now - updated) / (1000 * 60 * 60 * 24);
              return daysSinceUpdate > 7;
            });

            if (stale.length > 0) {
              core.info(`⚠️ ${stale.length} PRs לא עודכנו מעל שבוע:`);
              for (const pr of stale) {
                core.info(`  - #${pr.number}: ${pr.title}`);

                // Add a gentle reminder
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: [
                    '### 💤 תזכורת ידידותית',
                    '',
                    `ה-PR הזה לא עודכן מעל שבוע.`,
                    '',
                    '**אפשרויות:**',
                    '- 🔄 לעדכן ולסיים את העבודה',
                    '- 💬 לבקש עזרה בתגובה',
                    '- ❌ לסגור אם כבר לא רלוונטי',
                    '',
                    '> 🤖 תזכורת אוטומטית מראלף'
                  ].join('\n')
                });
              }
            } else {
              core.info('✅ כל ה-PRs פעילים — מצוין!');
            }
