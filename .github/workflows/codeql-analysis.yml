name: "CodeQL Analysis"

# This repo is primarily markdown, PowerShell, and config files.
# The JS/TS code (dashboard-ui, scripts/) doesn't have a root build step;
# build step is skipped — source-only analysis works fine on every PR/push.
# SDL compliance (#647): per-PR scanning enabled.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'  # Weekly on Sunday at 6 AM UTC
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: self-hosted
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Build
        shell: pwsh
        run: |
          # No root-level build process; let CodeQL analyze source directly
          Write-Output "Skipping build — source-only analysis"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
