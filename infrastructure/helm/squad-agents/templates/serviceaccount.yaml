# =============================================================================
# serviceaccount.yaml — Squad Agents ServiceAccount
#
# A single ServiceAccount shared by all Squad agent pods (Ralph, Picard,
# and the metrics exporter). Annotated for Azure Workload Identity so pods
# can acquire short-lived tokens for Key Vault and the GitHub API without
# storing long-lived credentials anywhere in the cluster.
#
# The azure.workload.identity/client-id annotation is generated from
# .Values.azure.managedIdentityClientId when that value is non-empty.
# =============================================================================
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "squad-agents.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "squad-agents.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.azure.managedIdentityClientId }}
    # Workload Identity: binds this ServiceAccount to the Managed Identity
    azure.workload.identity/client-id: {{ .Values.azure.managedIdentityClientId | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
