name: Squad Docs — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/squad-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.build.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build dependencies
        run: npm install --no-save markdown-it markdown-it-anchor

      - name: Build docs site
        id: build
        shell: bash
        run: |
          if ! test -f "docs/build.js"; then
            echo "docs/build.js not found, skipping build"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          node docs/build.js --out _site --base /squad
          if test -d "_site"; then
            echo "Build successful, _site directory created"
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "Build completed but no _site directory created"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload Pages artifact
        if: steps.build.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.skip != 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
