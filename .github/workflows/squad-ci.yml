name: Squad CI

on:
  push:
    branches: [main, dev]
    paths:
      - '**.js'
      - '**.ts'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - 'test/**'
      - 'scripts/**'
      - 'src/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, dev]
    paths:
      - '**.js'
      - '**.ts'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - 'test/**'
      - 'scripts/**'
      - 'src/**'
      - '.github/workflows/**'
  workflow_dispatch:
jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Run tests
        run: node --test test/*.test.js
