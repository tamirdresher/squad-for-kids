apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "squad.fullname" . }}-agent-{{ .Values.agent.name }}
  namespace: {{ .Values.squad.namespace }}
  labels:
    {{- include "squad.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
    squad.io/agent-name: {{ .Values.agent.name }}
    squad.io/issue-number: {{ .Values.agent.issueNumber | quote }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "squad.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
        squad.io/agent-name: {{ .Values.agent.name }}
        squad.io/issue-number: {{ .Values.agent.issueNumber | quote }}
        {{- if .Values.agent.capabilities }}
        {{- range .Values.agent.capabilities }}
        capability.squad.io/{{ . }}: "true"
        {{- end }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "squad.fullname" . }}
      restartPolicy: OnFailure
      {{- if .Values.scheduling.capabilityNodes.enabled }}
      {{- if has "gpu" .Values.agent.capabilities }}
      nodeSelector:
        {{- toYaml .Values.scheduling.capabilityNodes.gpuNodeSelector | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
        - name: agent
          image: {{ .Values.agent.image }}
          imagePullPolicy: Always
          env:
            - name: SQUAD_REPO
              value: {{ .Values.squad.repository }}
            - name: AGENT_NAME
              value: {{ .Values.agent.name }}
            - name: ISSUE_NUMBER
              value: {{ .Values.agent.issueNumber | quote }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.tokenSecretName }}
                  key: token
            {{- if .Values.ratePool.enabled }}
            - name: RATE_POOL_REDIS
              value: "redis://{{ include "squad.fullname" . }}-rate-pool:6379"
            {{- end }}
            - name: COPILOT_PRIMARY_MODEL
              value: {{ .Values.copilot.primaryModel }}
            - name: COPILOT_FALLBACK_CHAIN
              value: {{ join "," .Values.copilot.fallbackChain }}
            {{- if .Values.agent.capabilities }}
            - name: AGENT_CAPABILITIES
              value: {{ join "," .Values.agent.capabilities }}
            {{- end }}
          volumeMounts:
            - name: squad-state
              mountPath: /squad-state
          resources:
            {{- if .Values.agent.resources }}
            {{- toYaml .Values.agent.resources | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.agent.defaultResources | nindent 12 }}
            {{- end }}
      volumes:
        - name: squad-state
          persistentVolumeClaim:
            claimName: {{ include "squad.fullname" . }}-state
