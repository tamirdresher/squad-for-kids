name: Squad Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: node --test test/*.test.js

      - name: Validate version consistency
        run: |
          $VERSION = node -e "console.log(require('./package.json').version)"
          if (-not (Test-Path "CHANGELOG.md")) {
            Write-Output "::warning::CHANGELOG.md not found — skipping version validation"
          } elseif (-not (Select-String -Path "CHANGELOG.md" -Pattern "## \[$VERSION\]" -Quiet -ErrorAction SilentlyContinue)) {
            Write-Output "::error::Version $VERSION not found in CHANGELOG.md — update CHANGELOG.md before release"
            exit 1
          } else {
            Write-Output "Version $VERSION validated in CHANGELOG.md"
          }

      - name: Read version from package.json
        id: version
        run: |
          $VERSION = node -e "console.log(require('./package.json').version)"
          "version=$VERSION" >> $env:GITHUB_OUTPUT
          "tag=v$VERSION" >> $env:GITHUB_OUTPUT
          Write-Output "📦 Version: $VERSION (tag: v$VERSION)"

      - name: Check if tag already exists
        id: check_tag
        run: |
          $tagExists = git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Output "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
            Write-Output "Tag ${{ steps.version.outputs.tag }} does not exist — creating release."
          }
          exit 0

      - name: Create git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --latest

      - name: Verify release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.version.outputs.tag }}"
          echo "✅ Release ${{ steps.version.outputs.tag }} created and verified."
