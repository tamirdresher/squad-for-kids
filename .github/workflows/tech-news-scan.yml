name: Tech News Scanner

on:
  schedule:
    # Run daily at 9 AM UTC (1 AM PT, 4 AM ET)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  issues: write
  contents: read

jobs:
  scan-tech-news:
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      
      - name: Run tech news scanner
        id: scan
        run: |
          node scripts/tech-news-scanner.js > digest.md 2>&1
          "digest_file=digest.md" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
      
      - name: Create GitHub Issue with Digest
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const digest = fs.readFileSync('digest.md', 'utf8');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Tech News Digest - ${new Date().toISOString().split('T')[0]}`,
              body: digest,
              labels: ['tech-news', 'automated', 'digest']
            });

            console.log(`Created issue #${issue.data.number}`);