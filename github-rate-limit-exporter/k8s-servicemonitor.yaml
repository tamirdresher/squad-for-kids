---
# ServiceMonitor for Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: github-rate-limit-exporter
  namespace: default
  labels:
    app: github-rate-limit-exporter
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: github-rate-limit-exporter
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    scheme: http
