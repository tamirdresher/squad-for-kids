name: Helm/Kustomize Drift Detection

# WORKFLOW DISABLED: 2026-03-20
# Reason: GitHub EMU policy blocks hosted runners (ubuntu-latest). Self-hosted
# runners with bash/WSL support not yet configured.
#
# To re-enable:
# 1. Configure self-hosted Linux/WSL runners
# 2. Enable workflow via GitHub UI or API
# 3. Restore pull_request trigger below
# See: .squad/decisions/inbox/worf-drift-detection-disabled.md

on:
  # NOTE: pull_request trigger disabled — GitHub Actions hosted runners are not
  # available in this org (EMU policy). To re-enable, configure self-hosted
  # runners with bash/WSL support and restore the pull_request trigger.
  workflow_dispatch:

env:
  BASE_BRANCH: origin/${{ github.base_ref }}

jobs:
  detect-drift:
    name: Detect Configuration Drift
    runs-on: ubuntu-latest
    outputs:
      helm_drift: ${{ steps.detect.outputs.helm_drift }}
      kustomize_drift: ${{ steps.detect.outputs.kustomize_drift }}
      security_drift: ${{ steps.detect.outputs.security_drift }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      
      - name: Detect Helm/Kustomize changes
        id: detect
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/drift-detection"
          if [ -f scripts/drift-detection/detect-helm-kustomize-changes.sh ]; then
            bash scripts/drift-detection/detect-helm-kustomize-changes.sh
          else
            echo "Script not found, skipping detection"
            echo "HELM_DRIFT=false" > "$RUNNER_TEMP/drift-detection/changes.env"
            echo "KUSTOMIZE_DRIFT=false" >> "$RUNNER_TEMP/drift-detection/changes.env"
            echo "SECURITY_DRIFT=false" >> "$RUNNER_TEMP/drift-detection/changes.env"
          fi

          # Load results
          if [ -f "$RUNNER_TEMP/drift-detection/changes.env" ]; then
            while IFS='=' read -r name value; do
              echo "${name}=${value}" >> "$GITHUB_OUTPUT"
            done < "$RUNNER_TEMP/drift-detection/changes.env"
          fi
      
      - name: Upload drift detection results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: drift-detection-results
          path: ${{ runner.temp }}/drift-detection/
          retention-days: 3
          if-no-files-found: ignore

  validate-manifests:
    name: Validate Manifests
    runs-on: ubuntu-latest
    needs: detect-drift
    if: needs.detect-drift.outputs.helm_drift == 'true' || needs.detect-drift.outputs.kustomize_drift == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      
      - name: Download drift detection results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: drift-detection-results
          path: ${{ runner.temp }}/drift-detection/
      
      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: 'v3.13.0'
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: 'v1.28.0'
      
      - name: Install conftest (OPA policy testing)
        shell: bash
        run: |
          if ! command -v conftest &> /dev/null; then
            echo "Installing conftest..."
            curl -sLO "https://github.com/open-policy-agent/conftest/releases/download/v0.49.1/conftest_0.49.1_Linux_x86_64.tar.gz"
            tar xzf conftest_0.49.1_Linux_x86_64.tar.gz
            sudo mv conftest /usr/local/bin/
          fi
          conftest --version
      
      - name: Render and validate manifests
        id: validate
        shell: bash
        run: |
          if [ -f scripts/drift-detection/render-and-validate.sh ]; then
            bash scripts/drift-detection/render-and-validate.sh
          else
            echo "Script not found, skipping validation"
          fi
        continue-on-error: true
      
      - name: Upload rendered manifests
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: rendered-manifests
          path: ${{ runner.temp }}/drift-detection/rendered/
          retention-days: 3
      
      - name: Check validation result
        if: steps.validate.outcome == 'failure'
        shell: bash
        run: |
          echo "::error::Manifest validation failed - security issues detected"
          exit 1

  generate-report:
    name: Generate Compliance Report
    runs-on: ubuntu-latest
    needs: [detect-drift, validate-manifests]
    if: always() && (needs.detect-drift.outputs.helm_drift == 'true' || needs.detect-drift.outputs.kustomize_drift == 'true')
    permissions:
      issues: write
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      
      - name: Download drift detection results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: drift-detection-results
          path: ${{ runner.temp }}/drift-detection/
      
      - name: Download rendered manifests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: rendered-manifests
          path: ${{ runner.temp }}/drift-detection/rendered/
        continue-on-error: true
      
      - name: Generate compliance delta report
        id: report
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [ -f scripts/drift-detection/compliance-delta-report.sh ]; then
            bash scripts/drift-detection/compliance-delta-report.sh
          else
            echo "Script not found, skipping report generation"
          fi
        continue-on-error: true
      
      - name: Upload compliance report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: compliance-delta-report
          path: ${{ runner.temp }}/drift-detection/compliance-delta-report.md
          retention-days: 3
      
      - name: Comment PR with compliance report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const reportPath = process.env.RUNNER_TEMP + '/drift-detection/compliance-delta-report.md';
            
            if (!fs.existsSync(reportPath)) {
              console.log('Report file not found, skipping PR comment');
              return;
            }
            
            const report = fs.readFileSync(reportPath, 'utf8');
            
            // Find existing drift detection comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const driftComment = comments.find(comment => 
              comment.body.includes('FedRAMP Compliance Delta Report')
            );
            
            const commentBody = report;
            
            if (driftComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: driftComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
      
      - name: Fail if validation failed
        if: needs.validate-manifests.result == 'failure'
        shell: bash
        run: |
          echo "::error::Drift validation failed - see compliance report for details"
          exit 1
