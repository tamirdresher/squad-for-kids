# Sync tamirdresher/squad fork with upstream bradygaster/squad
# Keeps the dev branch current to avoid merge conflicts.
#
# Auth note: GITHUB_TOKEN from this repo (tamresearch1) cannot write to
# tamirdresher/squad (personal account). A PAT with repo scope stored
# as SQUAD_SYNC_PAT is required. The PAT must belong to an account
# with push access to tamirdresher/squad.

name: Sync Squad Fork

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Sync dev branch
        id: sync
        env:
          GH_TOKEN: ${{ secrets.SQUAD_SYNC_PAT }}
        run: |
          $output = gh repo sync tamirdresher/squad --source bradygaster/squad --branch dev 2>&1
          $output | Out-File -FilePath sync-output.txt -Encoding utf8
          Write-Host $output
          if ($LASTEXITCODE -ne 0) { throw "Sync failed" }

      - name: Sync main branch
        if: success()
        env:
          GH_TOKEN: ${{ secrets.SQUAD_SYNC_PAT }}
        run: |
          $output = gh repo sync tamirdresher/squad --source bradygaster/squad --branch main 2>&1
          Write-Host $output

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $syncOutput = if (Test-Path sync-output.txt) { Get-Content sync-output.txt -Raw } else { "No output captured" }
          $date = Get-Date -Format "yyyy-MM-dd"
          $body = @"
          ## Fork sync failed

          The daily sync of ``tamirdresher/squad`` from ``bradygaster/squad`` failed.

          **Branch:** dev
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ### Output
          ``````
          $syncOutput
          ``````

          ### Resolution
          Run ``scripts/sync-squad-fork.ps1`` locally to inspect and resolve.
          "@
          $bodyFile = New-TemporaryFile
          $body | Out-File -FilePath $bodyFile -Encoding utf8
          gh issue create --repo ${{ github.repository }} --title "Squad fork sync failed ($date)" --body-file $bodyFile --label "automation,squad-sync"
