# samples/Kind.AppHost/values.dev.yaml
# Helm values for the sample-api chart in dev/test mode

replicaCount: 1

image:
  repository: nginx   # placeholder — swap for your real image
  tag: "1.25"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"
