name: Squad Promote

on:
  workflow_dispatch:

jobs:
  dev-to-preview:
    name: Promote dev → preview
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state (dry run info)
        run: |
          Write-Output "=== dev HEAD ===" ; git log origin/dev -1 --oneline
          Write-Output "=== preview HEAD ===" ; git log origin/preview -1 --oneline
          Write-Output "=== Files that would be stripped ==="
          $files = git diff origin/preview..origin/dev --name-only | Select-String -Pattern "^(\.(ai-team|squad|ai-team-templates|squad-templates)|team-docs/|docs/proposals/)"
          if ($files) { $files } else { Write-Output "(none)" }

      - name: Merge dev → preview (strip forbidden paths)
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git checkout preview
          git merge origin/dev --no-commit --no-ff -X theirs ; if ($LASTEXITCODE -ne 0) { $null }

          # Strip forbidden paths from merge commit
          git rm -rf --cached --ignore-unmatch .ai-team/ .squad/ .ai-team-templates/ .squad-templates/ team-docs/ "docs/proposals/" ; if ($LASTEXITCODE -ne 0) { $null }

          # Commit if there are staged changes
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            $version = node -e "console.log(require('./package.json').version)"
            git commit -m "chore: promote dev → preview (v$version)"
            git push origin preview
            Write-Output "✅ Pushed preview branch"
          } else {
            Write-Output "ℹ️ Nothing to commit — preview is already up to date"
          }

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."

  preview-to-main:
    name: Promote preview → main (release)
    needs: dev-to-preview
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state
        run: |
          Write-Output "=== preview HEAD ===" ; git log origin/preview -1 --oneline
          Write-Output "=== main HEAD ===" ; git log origin/main -1 --oneline
          Write-Output "=== Version ===" ; node -e "console.log('v' + require('./package.json').version)"

      - name: Validate preview is release-ready
        run: |
          git checkout preview
          $VERSION = node -e "console.log(require('./package.json').version)"
          if (-not (Select-String -Path "CHANGELOG.md" -Pattern "## \[$VERSION\]" -Quiet 2>$null)) {
            Write-Output "::error::Version $VERSION not found in CHANGELOG.md — update before releasing"
            exit 1
          }
          Write-Output "✅ Version $VERSION has CHANGELOG entry"

          # Verify no forbidden files on preview
          $FORBIDDEN = git ls-files | Select-String -Pattern "^(\.(ai-team|squad|ai-team-templates|squad-templates)/|team-docs/|docs/proposals/)"
          if ($FORBIDDEN) {
            Write-Output "::error::Forbidden files found on preview: $FORBIDDEN"
            exit 1
          }
          Write-Output "✅ No forbidden files on preview"

      - name: Merge preview → main
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git checkout main
          $version = node -e "console.log(require('./package.json').version)"
          git merge origin/preview --no-ff -m "chore: promote preview → main (v$version)"
          git push origin main
          Write-Output "✅ Pushed main — squad-release.yml will tag and publish the release"

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: Write-Output "🔍 Dry run complete — no changes pushed."
