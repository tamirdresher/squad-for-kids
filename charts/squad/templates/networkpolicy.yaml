apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "squad.fullname" . }}
  namespace: {{ .Values.squad.namespace }}
  labels:
    {{- include "squad.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "squad.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Allow GitHub API access (api.github.com)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    # Allow Redis access within namespace
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: rate-pool
      ports:
        - protocol: TCP
          port: 6379
