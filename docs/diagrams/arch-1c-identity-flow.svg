<text x="435" y="377" font-size="10" fill="#1B1A19">1. Pod starts with ServiceAccount</text>
<text x="435" y="394" font-size="10" fill="#1B1A19">2. K8s projects OIDC token</text>
<text x="435" y="411" font-size="10" fill="#1B1A19">3. Token exchanged for Azure AD token</text>
<text x="435" y="428" font-size="10" fill="#1B1A19">4. AD token accesses Key Vault / ACR</text>
