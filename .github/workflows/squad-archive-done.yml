name: Squad Archive Done Items

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  archive-done-items:
    runs-on: self-hosted
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive old Done items
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.SQUAD_PROJECT_TOKEN }}
          DAYS_THRESHOLD: '3'
          PROJECT_OWNER: 'tamirdresher_microsoft'
          PROJECT_NUMBER: '1'
          PROJECT_ID: 'PVT_kwHOC0L5c84BRG-P'
          STATUS_FIELD_ID: 'PVTSSF_lAHOC0L5c84BRG-Pzg_CIuc'
        run: |
          $daysThreshold = [int]$env:DAYS_THRESHOLD
          $cutoffDate = (Get-Date).AddDays(-$daysThreshold)
          Write-Host "🔍 Looking for Done items older than $daysThreshold days (before $($cutoffDate.ToString('o')))"

          # List all project items using gh CLI (uses runner's gh auth, which has project access)
          $itemsJson = gh project item-list $env:PROJECT_NUMBER --owner $env:PROJECT_OWNER --format json 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Failed to list project items: $itemsJson"
            exit 1
          }

          $data = $itemsJson | ConvertFrom-Json
          $items = $data.items
          Write-Host "📋 Found $($items.Count) total items on the project board"

          $checkedCount = 0
          $archivedCount = 0

          foreach ($item in $items) {
            if ($item.status -eq 'Done') {
              $checkedCount++
              $content = $item.content
              if (-not $content -or -not $content.number) { continue }

              # Check if the issue was updated before the cutoff
              $issueJson = gh issue view $content.number --json updatedAt,state,title 2>$null
              if ($LASTEXITCODE -ne 0) { continue }
              $issue = $issueJson | ConvertFrom-Json
              $updatedAt = [DateTime]::Parse($issue.updatedAt)

              if ($updatedAt -lt $cutoffDate) {
                Write-Host "📦 Archiving: #$($content.number) - $($issue.title) (updated: $($updatedAt.ToString('o')))"

                # Close the issue if still open
                if ($issue.state -eq 'OPEN') {
                  gh issue close $content.number --comment "✅ Archived by Squad — this item was in Done status for $daysThreshold+ days." 2>$null
                }

                # Archive from the project board using GraphQL via gh api
                $mutation = "mutation { archiveProjectV2Item(input: {projectId: \`"$($env:PROJECT_ID)\`", itemId: \`"$($item.id)\`"}) { item { id } } }"
                gh api graphql -f query="$mutation" 2>$null
                if ($LASTEXITCODE -eq 0) {
                  $archivedCount++
                } else {
                  Write-Host "⚠️ Could not archive #$($content.number) from board (may need project token)"
                }
              } else {
                Write-Host "⏳ Skipping: #$($content.number) - $($issue.title) (updated: $($updatedAt.ToString('o'))) - not old enough"
              }
            }
          }

          Write-Host ""
          Write-Host "✅ Summary:"
          Write-Host "   - Checked $checkedCount Done items"
          Write-Host "   - Archived $archivedCount items older than $daysThreshold days"
