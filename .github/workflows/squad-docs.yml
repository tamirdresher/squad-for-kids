name: Squad Docs — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/squad-docs.yml'
  workflow_dispatch:
jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build dependencies
        run: npm install --no-save markdown-it markdown-it-anchor

      - name: Build docs site
        run: |
          if (-not (Test-Path "docs\build.js")) {
            Write-Host "docs/build.js not found, skipping build"
            exit 0
          }
          node docs/build.js --out _site --base /squad

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
